<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsFlow — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050508;
            --bg-surface: #111118;
            --bg-elevated: #18181f;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #00D26A;
            --accent-glow: rgba(0, 210, 106, 0.4);
            --accent-soft: rgba(0, 210, 106, 0.1);
            --text-bright: #FAFAFA;
            --text-primary: #E4E4E7;
            --text-muted: #71717A;
            --text-dim: #52525B;
            --danger: #EF4444;
            --radius-md: 12px;
            --radius-xl: 24px;
            --shadow-glow: 0 0 60px -12px var(--accent-glow);
            --shadow-elevated: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-ambient {
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .bg-ambient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 210, 106, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 184, 212, 0.1) 0%, transparent 50%);
            animation: ambientFloat 20s ease-in-out infinite;
        }
        @keyframes ambientFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .grain {
            position: fixed;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: fadeSlideUp 0.8s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: var(--shadow-elevated);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #00B876 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: var(--shadow-glow);
            margin: 0 auto 20px;
            position: relative;
            overflow: hidden;
        }
        .brand-icon::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
        }
        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-bright) 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .brand p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 10px;
            font-family: 'Space Mono', monospace;
        }
        .form-group input {
            width: 100%;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #00B876 100%);
            color: #000;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 20px -4px var(--accent-glow);
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px -4px var(--accent-glow);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.3s ease-in-out;
        }
        .error-message.show {
            display: block;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .footer-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>
    <div class="grain"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <h1>WhatsFlow</h1>
                <p>Premium Messaging Platform</p>
            </div>

            <div class="error-message" id="errorMessage">
                Usuário ou senha incorretos
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-login">Acessar Plataforma</button>
            </form>

            <div class="footer-text">
                Acesso restrito • Todos os direitos reservados
            </div>
        </div>
    </div>

    <script>
        // Credenciais (em produção, use backend real)
        const VALID_CREDENTIALS = {
            'admin': 'admin123'
        };

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // Validar credenciais
            if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === password) {
                // Login bem-sucedido
                sessionStorage.setItem('whatsflow_authenticated', 'true');
                sessionStorage.setItem('whatsflow_user', username);
                window.location.href = 'index.html';
            } else {
                // Login falhou
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
            }
        }

        // Se já estiver autenticado, redirecionar
        if (sessionStorage.getItem('whatsflow_authenticated') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
