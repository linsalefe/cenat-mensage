<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENAT Mensage - Premium Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cenat-blue: #2A658F;
            --cenat-ink: #27273D;
            --cenat-ice: #E2ECF4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f5f8fa; color: var(--cenat-ink); }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 280px; height: 100vh;
            background: var(--cenat-ink); padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000;
        }
        .logo-container { width: 140px; height: 80px; margin-bottom: 30px; }
        .logo-container svg { width: 100%; height: 100%; }
        .brand-title { font-family: 'Raleway', sans-serif; font-size: 28px; font-weight: 700; color: white; text-align: center; margin-bottom: 8px; }
        .brand-subtitle { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 40px; }
        .system-status { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.9); font-size: 13px; }
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .main-content { margin-left: 280px; padding: 40px; }
        .config-section { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-label { font-size: 13px; font-weight: 500; color: var(--cenat-ink); margin-bottom: 8px; }
        .form-input { padding: 12px 16px; border: 2px solid var(--cenat-ice); border-radius: 8px; font-size: 14px; width: 100%; }
        .form-input:focus { outline: none; border-color: var(--cenat-blue); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: var(--cenat-blue); color: white; }
        .btn-primary:hover { background: #1e4a6f; }
        .btn-secondary { background: var(--cenat-ice); color: var(--cenat-ink); }
        .btn-danger { background: #ef4444; color: white; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--cenat-ice); }
        .tab { padding: 12px 24px; background: transparent; border: none; font-size: 14px; font-weight: 500; color: rgba(39,39,61,0.6); cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--cenat-blue); border-bottom-color: var(--cenat-blue); }
        .instance-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .instance-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .instance-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .qr-container { background: var(--cenat-ice); border-radius: 12px; padding: 30px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <svg viewBox="0 0 394 186" xmlns="http://www.w3.org/2000/svg">
                <path fill="#2A658F" d="M89.5,13.2c-15.7,8.7-30.1,22-41.3,38.6L35.5,70.5L22.8,51.8C11.6,35.2-2.8,21.9-18.5,13.2L0,0L89.5,13.2z"/>
                <path fill="#27273D" d="M143.2,13.2c15.7,8.7,30.1,22,41.3,38.6l12.7,18.7l12.7-18.7c11.2-16.6,25.6-29.9,41.3-38.6L232.7,0L143.2,13.2z"/>
            </svg>
        </div>
        <h1 class="brand-title">CENAT Mensage</h1>
        <p class="brand-subtitle">Premium Messaging</p>
        <div class="system-status"><div class="status-dot"></div><span>Sistema Operacional</span></div>
    </div>

    <div class="main-content">
        <div class="config-section">
            <h2>🔧 Configurações de Conexão</h2>
            <div class="form-grid">
                <div><label class="form-label">Server URL</label><input type="text" id="serverUrl" class="form-input" value="http://13.221.209.242/api"></div>
                <div><label class="form-label">Webhook URL</label><input type="text" id="webhookUrl" class="form-input" value="http://13.221.209.242/webhook"></div>
                <div><label class="form-label">API Key</label><input type="password" id="apiKey" class="form-input" value="c4772f6289bb10feced615a15607a38dba72a8eb06efc304"></div>
            </div>
            <button class="btn btn-primary" onclick="loadInstances()">🔌 Conectar</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('instances')">📱 Instâncias</button>
            <button class="tab" onclick="showTab('bulk')">📢 Disparo em Massa</button>
        </div>

        <div id="instances-tab">
            <div class="config-section">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="newInstanceName" class="form-input" placeholder="Nome da nova instância..." style="flex: 1;">
                    <button class="btn btn-primary" onclick="createInstance()">+ Nova Instância</button>
                    <button class="btn btn-secondary" onclick="loadInstances()">🔄 Atualizar</button>
                </div>
                <div id="instances-list"></div>
            </div>
        </div>

        <div id="bulk-tab" style="display: none;">
            <div class="config-section">
                <h2>📢 Disparo em Massa</h2>
                <div style="margin-bottom: 20px;"><label class="form-label">Instância</label><select id="bulkInstance" class="form-input"></select></div>
                <div style="margin-bottom: 20px;"><label class="form-label">Números (um por linha)</label><textarea id="bulkNumbers" class="form-input" rows="8"></textarea></div>
                <div style="margin-bottom: 20px;"><label class="form-label">Mensagem</label><textarea id="bulkMessage" class="form-input" rows="5"></textarea></div>
                <button class="btn btn-primary" onclick="sendBulk()">📤 Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const API = {
            async call(endpoint, method = 'GET', body = null) {
                const serverUrl = document.getElementById('serverUrl').value.replace(/\/$/, '');
                const apiKey = document.getElementById('apiKey').value;
                const options = { method, headers: { 'apikey': apiKey, 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(serverUrl + endpoint, options);
                return await response.json();
            }
        };

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id$="-tab"]').forEach(c => c.style.display = 'none');
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').style.display = 'block';
        }

        async function loadInstances() {
            const data = await API.call('/instance/fetchInstances');
            const list = document.getElementById('instances-list');
            const select = document.getElementById('bulkInstance');
            list.innerHTML = '';
            select.innerHTML = '<option value="">Selecione</option>';
            data.forEach(i => {
                list.innerHTML += `<div class="instance-card"><div class="instance-header"><h3>${i.name}</h3><span>${i.state||'offline'}</span></div><div class="instance-actions"><button class="btn btn-primary" onclick="connectInstance('${i.name}')">📱 QR</button><button class="btn btn-secondary" onclick="configWebhook('${i.name}')">🔗 Webhook</button><button class="btn btn-danger" onclick="deleteInstance('${i.name}')">🗑️</button></div><div id="qr-${i.name}" class="qr-container" style="display:none;"></div></div>`;
                select.innerHTML += `<option value="${i.name}">${i.name}</option>`;
            });
        }

        async function createInstance() {
            const name = document.getElementById('newInstanceName').value.trim();
            if (!name) return alert('Digite um nome');
            await API.call('/instance/create', 'POST', { instanceName: name, integration: 'WHATSAPP-BAILEYS', qrcode: true });
            document.getElementById('newInstanceName').value = '';
            loadInstances();
        }

        async function connectInstance(name) {
            const data = await API.call(`/instance/connect/${name}`);
            const div = document.getElementById(`qr-${name}`);
            div.style.display = 'block';
            if (data.base64) div.innerHTML = `<img src="${data.base64}" style="max-width:300px;">`;
        }

        async function deleteInstance(name) {
            if (!confirm(`Excluir ${name}?`)) return;
            await API.call(`/instance/delete/${name}`, 'DELETE');
            loadInstances();
        }

        async function configWebhook(name) {
            const url = document.getElementById('webhookUrl').value;
            await API.call(`/webhook/set/${name}`, 'POST', { url, webhook_by_events: true });
            alert('Webhook configurado!');
        }

        async function sendBulk() {
            const instance = document.getElementById('bulkInstance').value;
            const numbers = document.getElementById('bulkNumbers').value.split('\n').filter(n => n.trim());
            const message = document.getElementById('bulkMessage').value.trim();
            if (!instance || !numbers.length || !message) return alert('Preencha todos os campos');
            for (let num of numbers) {
                await API.call(`/message/sendText/${instance}`, 'POST', { number: num.trim(), text: message });
                await new Promise(r => setTimeout(r, 1000));
            }
            alert('Disparos concluídos!');
        }

        document.addEventListener('DOMContentLoaded', () => setTimeout(loadInstances, 500));
    </script>
</body>
</html>
