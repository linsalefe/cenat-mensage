<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENAT Mensage - Premium Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cenat-blue: #2A658F;
            --cenat-ink: #27273D;
            --cenat-ice: #E2ECF4;
            --cenat-sky: #CCE4F4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #1a1a1a; color: #e5e5e5; display: flex; min-height: 100vh; }
        
        /* SIDEBAR CLARO */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 280px; height: 100vh;
            background: white; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1); z-index: 1000;
        }
        .logo-container { width: 110px; height: 60px; margin: 0 auto 22px auto; display: flex; align-items: center; justify-content: center; }
        .logo-container svg { width: 100%; height: 100%; display: block; }
        .brand-title { font-family: 'Raleway', sans-serif; font-size: 28px; font-weight: 700; color: var(--cenat-ink); text-align: center; margin-bottom: 8px; }
        .brand-subtitle { font-size: 11px; color: var(--cenat-blue); text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 40px; }
        .system-status { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--cenat-ice); border-radius: 8px; color: var(--cenat-ink); font-size: 13px; }
        .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .sidebar-nav { margin-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { width: 100%; padding: 14px 20px; background: transparent; border: none; border-radius: 8px; color: var(--cenat-ink); font-size: 14px; cursor: pointer; text-align: left; transition: all 0.3s; font-family: 'Roboto', sans-serif; font-weight: 500; }
        .nav-item:hover { background: var(--cenat-ice); }
        .nav-item.active { background: var(--cenat-blue); color: white; }
        
        /* MAIN ESCURO */
        .main-content { margin-left: 280px; padding: 40px; flex: 1; }
        .config-section { background: #242424; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 1px solid #333; }
        .config-section h2 { color: #f5f5f5; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-label { font-size: 13px; font-weight: 500; color: #b0b0b0; margin-bottom: 8px; text-transform: uppercase; display: block; }
        .form-input, textarea, select { padding: 12px 16px; border: 2px solid #333; border-radius: 8px; font-size: 14px; width: 100%; font-family: 'Roboto', sans-serif; background: #1a1a1a; color: #e5e5e5; }
        .form-input:focus, textarea:focus, select:focus { outline: none; border-color: var(--cenat-blue); }
        
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; font-family: 'Roboto', sans-serif; }
        .btn-primary { background: var(--cenat-blue); color: white; }
        .btn-primary:hover { background: #1e4a6f; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(42,101,143,0.3); }
        .btn-secondary { background: #333; color: #e5e5e5; }
        .btn-danger { background: #ef4444; color: white; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .instance-card { background: #242424; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #333; }
        .instance-card h3 { color: #f5f5f5; margin-bottom: 10px; }
        .instance-card p { color: #b0b0b0; }
        
        /* DISPARO */
        .disparo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .disparo-card { background: #242424; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); border: 1px solid #333; }
        .disparo-card h3 { color: #f5f5f5; margin-bottom: 16px; }
        .contacts-preview { max-height: 200px; overflow-y: auto; background: #1a1a1a; border-radius: 8px; padding: 12px; border: 1px solid #333; }
        .stat-grid { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #f5f5f5; }
        .progress-bar { background: #333; border-radius: 100px; height: 8px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--cenat-blue), #1e4a6f); width: 0%; transition: width 0.3s; }
        .logs-container { height: 200px; overflow-y: auto; background: #0d1117; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.8rem; color: #7ee787; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
            .disparo-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <svg viewBox="0 0 250 100" xmlns="http://www.w3.org/2000/svg">
                <path fill="#2A658F" d="M89.5,13.2c-15.7,8.7-30.1,22-41.3,38.6L35.5,70.5L22.8,51.8C11.6,35.2-2.8,21.9-18.5,13.2L0,0L89.5,13.2z"/>
                <path fill="#CCE4F4" d="M143.2,13.2c15.7,8.7,30.1,22,41.3,38.6l12.7,18.7l12.7-18.7c11.2-16.6,25.6-29.9,41.3-38.6L232.7,0L143.2,13.2z"/>
            </svg>
        </div>
        <h1 class="brand-title">CENAT Mensage</h1>
        <p class="brand-subtitle">Premium Messaging</p>
        <div class="system-status"><div class="status-dot"></div><span>Sistema Operacional</span></div>
        
        <nav class="sidebar-nav">
            <button class="nav-item active" onclick="showTab('instances')">📱 Instâncias</button>
            <button class="nav-item" onclick="showTab('disparo')">📢 Disparo em Massa</button>
        </nav>
    </div>

    <div class="main-content">
        <div class="config-section">
            <h2 style="margin-bottom: 20px;">🔧 Configurações de Conexão</h2>
            <div class="form-grid">
                <div><label class="form-label">Server URL</label><input type="text" id="serverUrl" class="form-input" value="http://13.221.209.242/api"></div>
                <div><label class="form-label">Webhook URL</label><input type="text" id="webhookUrl" class="form-input" value="http://13.221.209.242/webhook"></div>
                <div><label class="form-label">API Key</label><input type="password" id="apiKey" class="form-input" value="c4772f6289bb10feced615a15607a38dba72a8eb06efc304"></div>
            </div>
            <button class="btn btn-primary" onclick="loadInstances()">🔌 Conectar</button>
        </div>

        <div id="instances-tab" class="tab-content active">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="newInstanceName" class="form-input" placeholder="Nome da nova instância..." style="flex: 1;">
                <button class="btn btn-primary" onclick="createInstance()">+ Nova Instância</button>
                <button class="btn btn-secondary" onclick="loadInstances()">🔄 Atualizar</button>
            </div>
            <div id="instances-list"></div>
        </div>

        <div id="disparo-tab" class="tab-content">
            <div class="disparo-grid">
                <div class="disparo-card">
                    <h3>📤 Configurar Disparo</h3>
                    <div style="margin-bottom: 16px;"><label class="form-label">Instância</label><select id="disparoInstance" class="form-input"></select></div>
                    <div style="margin-bottom: 16px;"><label class="form-label">CSV (nome,numero)</label><input type="file" id="csvFile" accept=".csv" class="form-input" onchange="handleCSVUpload()"></div>
                    <div style="margin-bottom: 16px;"><label class="form-label">Mensagem ({nome})</label><textarea id="disparoMessage" rows="4" class="form-input" placeholder="Olá {nome}!"></textarea></div>
                    <div style="margin-bottom: 20px;"><label class="form-label">Intervalo (seg)</label><input type="number" id="disparoInterval" value="3" min="1" max="60" class="form-input"></div>
                    <div style="display: flex; gap: 12px;">
                        <button class="btn btn-primary" onclick="startDisparo()" id="btnStart" style="flex: 1;">🚀 Iniciar</button>
                        <button class="btn btn-danger" onclick="stopDisparo()" id="btnStop" style="flex: 1; display: none;">⏹ Parar</button>
                    </div>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="disparo-card">
                        <h3>👥 Contatos (<span id="totalContacts">0</span>)</h3>
                        <div id="contactsPreview" class="contacts-preview"><p style="color: #999; text-align: center;">Nenhum arquivo carregado</p></div>
                    </div>
                    
                    <div class="disparo-card">
                        <h3>📊 Status</h3>
                        <div class="stat-grid">
                            <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div style="font-size: 0.7rem; color: #999;">TOTAL</div></div>
                            <div class="stat-item"><div class="stat-value" style="color: var(--cenat-blue);" id="statSent">0</div><div style="font-size: 0.7rem; color: #999;">ENVIADOS</div></div>
                            <div class="stat-item"><div class="stat-value" style="color: #ef4444;" id="statErrors">0</div><div style="font-size: 0.7rem; color: #999;">ERROS</div></div>
                        </div>
                        <div class="progress-bar"><div id="progressBar" class="progress-fill"></div></div>
                        <div style="text-align: center; font-size: 0.8rem; color: #999;"><span id="progressText">0%</span></div>
                    </div>
                </div>
            </div>
            
            <div class="disparo-card" style="margin-top: 24px;">
                <h3>📋 Logs em Tempo Real</h3>
                <div id="disparoLogs" class="logs-container"><div style="color: #8b949e;">Aguardando início do disparo...</div></div>
            </div>
        </div>
    </div>

    <script>
        const API = {
            async call(endpoint, method = 'GET', body = null) {
                const serverUrl = document.getElementById('serverUrl').value.replace(/\/$/, '');
                const apiKey = document.getElementById('apiKey').value;
                const options = { method, headers: { 'apikey': apiKey, 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(serverUrl + endpoint, options);
                return await response.json();
            }
        };

        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            if (tab === 'disparo') updateDisparoInstanceSelect();
        }

        let instancesData = [];
        async function loadInstances() {
            const data = await API.call('/instance/fetchInstances');
            instancesData = data;
            const list = document.getElementById('instances-list');
            list.innerHTML = data.map(i => `<div class="instance-card"><h3>${i.name}</h3><p>Status: ${i.connectionStatus||'offline'}</p><button class="btn btn-primary" onclick="connectInstance('${i.name}')">📱 QR</button> <button class="btn btn-danger" onclick="deleteInstance('${i.name}')">🗑️</button><div id="qr-${i.name}"></div></div>`).join('');
            updateDisparoInstanceSelect();
        }

        async function createInstance() {
            const name = document.getElementById('newInstanceName').value.trim();
            if (!name) return alert('Digite um nome');
            await API.call('/instance/create', 'POST', { instanceName: name, integration: 'WHATSAPP-BAILEYS', qrcode: true });
            document.getElementById('newInstanceName').value = '';
            loadInstances();
        }

        async function connectInstance(name) {
            const data = await API.call(`/instance/connect/${name}`);
            if (data.base64) document.getElementById(`qr-${name}`).innerHTML = `<img src="${data.base64}" style="max-width:300px;margin-top:10px;border-radius:8px;">`;
        }

        async function deleteInstance(name) {
            if (!confirm(`Excluir ${name}?`)) return;
            await API.call(`/instance/delete/${name}`, 'DELETE');
            loadInstances();
        }

        function updateDisparoInstanceSelect() {
            const select = document.getElementById('disparoInstance');
            select.innerHTML = instancesData.filter(i => i.connectionStatus === 'open').map(i => `<option value="${i.name}">${i.name}</option>`).join('') || '<option value="">Nenhuma conectada</option>';
        }

        let disparoContacts = [];
        let disparoPolling = null;

        function handleCSVUpload() {
            const file = document.getElementById("csvFile").files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split("\n").filter(l => l.trim());
                const startIndex = lines[0].toLowerCase().includes("nome") ? 1 : 0;
                disparoContacts = [];
                for (let i = startIndex; i < lines.length; i++) {
                    const parts = lines[i].split(",");
                    if (parts.length >= 2) {
                        const nome = parts[0].trim();
                        const numero = parts[1].trim().replace(/\D/g, "");
                        if (nome && numero) disparoContacts.push({ nome, numero });
                    }
                }
                document.getElementById("totalContacts").textContent = disparoContacts.length;
                const preview = document.getElementById("contactsPreview");
                if (disparoContacts.length > 0) {
                    let html = disparoContacts.slice(0, 10).map(c => `<div style="padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between;"><span style="color: #e5e5e5;">${c.nome}</span><span style="color: #999; font-family: monospace;">${c.numero}</span></div>`).join("");
                    if (disparoContacts.length > 10) html += `<div style="padding: 12px 0; text-align: center; color: #999;">... e mais ${disparoContacts.length - 10} contatos</div>`;
                    preview.innerHTML = html;
                } else {
                    preview.innerHTML = `<p style="color: #ef4444; text-align: center;">Nenhum contato válido</p>`;
                }
            };
            reader.readAsText(file);
        }

        async function startDisparo() {
            const instance = document.getElementById("disparoInstance").value;
            const message = document.getElementById("disparoMessage").value.trim();
            const interval = parseInt(document.getElementById("disparoInterval").value) || 3;
            const webhookUrl = document.getElementById('webhookUrl').value;
            const serverUrl = document.getElementById('serverUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            
            if (!instance || !disparoContacts.length || !message) return alert("Preencha todos os campos");
            
            const response = await fetch(`${webhookUrl}/disparo/start`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ instance, contacts: disparoContacts, message, interval, api_url: serverUrl, api_key: apiKey })
            });
            const data = await response.json();
            
            if (data.status === "started") {
                document.getElementById("btnStart").style.display = "none";
                document.getElementById("btnStop").style.display = "block";
                startDisparoPolling();
            }
        }

        async function stopDisparo() {
            const webhookUrl = document.getElementById('webhookUrl').value;
            await fetch(`${webhookUrl}/disparo/stop`, { method: "POST" });
        }

        function startDisparoPolling() {
            if (disparoPolling) clearInterval(disparoPolling);
            disparoPolling = setInterval(pollDisparoStatus, 2000);
            pollDisparoStatus();
        }

        async function pollDisparoStatus() {
            const webhookUrl = document.getElementById('webhookUrl').value;
            const response = await fetch(`${webhookUrl}/disparo/status`);
            const data = await response.json();
            
            document.getElementById("statTotal").textContent = data.total;
            document.getElementById("statSent").textContent = data.sent;
            document.getElementById("statErrors").textContent = data.errors;
            document.getElementById("progressBar").style.width = data.progress + "%";
            document.getElementById("progressText").textContent = data.progress + "%";
            
            const logsDiv = document.getElementById("disparoLogs");
            if (data.logs && data.logs.length > 0) {
                logsDiv.innerHTML = data.logs.map(log => {
                    const color = log.type === "success" ? "#7ee787" : log.type === "error" ? "#f85149" : "#8b949e";
                    return `<div style="color: ${color}; margin-bottom: 4px;">[${log.time}] ${log.message}</div>`;
                }).join("");
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
            
            if (!data.running && data.total > 0) {
                clearInterval(disparoPolling);
                document.getElementById("btnStart").style.display = "block";
                document.getElementById("btnStop").style.display = "none";
            }
        }

        document.addEventListener('DOMContentLoaded', () => setTimeout(loadInstances, 500));
    </script>
</body>
</html>
